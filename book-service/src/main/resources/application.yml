server:
  port: 8090

spring:
  application:
    name: book-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_DB_HOST}:${POSTGRES_DB_PORT}/${BOOK_DB_NAME}
    username: ${BOOK_DB_USER}
    password: ${BOOK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    check-location: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    connect-retries: 10
  hikari:
    pool-name: BookServiceHikariPool
    maximum-pool-size: 10
    minimum-idle: 10
    connection-timeout: 30000
    initialization-fail-timeout: 120000
    idle-timeout: 300000
    max-lifetime: 1200000
    leak-detection-threshold: 2000
    data-source-properties:
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048
      reWriteBatchedInserts: true
  jackson:
    serialization:
      fail-on-empty-beans: false

eureka:
  client:
    healthcheck:
      enabled: false
    service-url:
      defaultZone: ${EUREKA_HOST}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{X-Correlation-Id:-}]"
  level:
    root: INFO

