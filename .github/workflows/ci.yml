name: Java, Node & Next.js CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # --- 1. JAVA SECTION (Core/Gateway) ---
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Build & Tests
        run: |
          # Завантажуємо змінні для Java тестів
          export $(grep -v '^#' .env.example | xargs)
          chmod +x mvnw
          ./mvnw clean install -B

      # --- 2. NODE.JS SETUP ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            comment-service/package-lock.json
            next-app/package-lock.json

      - name: Install & Test Comment Service
        working-directory: ./comment-service
        run: |
          cp ../.env.example .env
          npm ci
          npm test
          npm run build

      - name: Install & Test Next App
        working-directory: ./next-app
        run: |
          cp ../.env.example .env
          npm ci
          npm test -- --run
          npm run build

      # --- 5. ARTIFACTS ---
      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: |
            **/target/surefire-reports/
            **/coverage/
            next-app/.next/error-log.txt
          retention-days: 5