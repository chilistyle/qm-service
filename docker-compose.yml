name: qm-service

services:
  postgres_db:
    image: postgres:18.3-alpine
    command: postgres -c max_connections=500
    container_name: postgres_db
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-initdb/restore.sh:/docker-entrypoint-initdb.d/01-restore.sh
      - ./.docker-initdb/keycloak-init.sql.gz:/tmp/backups/02-keycloak-init.sql.gz
      - ./.docker-initdb/init-db.sql:/docker-entrypoint-initdb.d/03-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d book_db" ]
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 10s
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: keycloak
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    command: start-dev
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres_db:5432/postgres
      - KC_DB_USERNAME=user
      - KC_DB_PASSWORD=password
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HTTP_MANAGEMENT_PORT=9000
      - KC_HEALTH_ENABLED=true
    ports:
      - "8186:8080"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/live HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep 'HTTP/1.1 200 OK' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 10s
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - app-network

  redis_cache:
    image: redis:8.6.2-alpine
    container_name: redis_cache
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:1.0-SNAPSHOT
    container_name: api-gateway
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    env_file:
      - .env.docker
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MANAGEMENT_TRACING_ENABLED=false
      - MANAGEMENT_OBSERVATIONS_HTTP_SERVER_REQUESTS_ENABLED=false
    ports:
      - "8080:8080"
    depends_on:
      redis_cache:
        condition: service_started
      keycloak:
        condition: service_healthy
      book-service:
        condition: service_started
    networks:
      - app-network

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: eureka-server:1.0-SNAPSHOT
    healthcheck:
      test: [ "CMD-SHELL", "netstat -an | grep 8761 | grep LISTEN || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
    container_name: eureka-server
    env_file:
      - .env.docker
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8761:8761"
    networks:
      - app-network

  book-service:
    build:
      context: ./book-service
      dockerfile: Dockerfile
    image: book-service:1.0-SNAPSHOT
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: book-service
    env_file:
      - .env.docker
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8090:8090"
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - app-network

  library-service:
    build:
      context: ./library-service
      dockerfile: Dockerfile
    image: library-service:1.0-SNAPSHOT
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    container_name: library-service
    ports:
      - "8100:8100"
    env_file:
      - .env.docker
    environment:
      - QUARKUS_PROFILE=docker
      - STORK_LIBRARY_SERVICE_SERVICE_REGISTRAR_RENEWAL_INTERVAL=10
    depends_on:
      postgres_db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: